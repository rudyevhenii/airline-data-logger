spring:
  application:
    name: airline-data-logger

  datasource:
    password: root
    username: root
    url: jdbc:mysql://localhost:3306/airline_data_logger

  mail:
    host: smtp.gmail.com
    username: ${EMAIL_NAME}
    port: '587'
    properties:
      mail:
        smtp:
          starttls:
            enable: 'true'
          auth: 'true'
    password: ${EMAIL_APP_PASSWORD}

  jpa:
    show-sql: 'true'
    properties:
      hibernate:
        format_sql: 'true'

  flyway:
    locations:
      - classpath:db/migration/data
      - classpath:db/migration/schema

application:
  database:
    name: airline_data_logger
